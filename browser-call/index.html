<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanisSetu AI — Live Browser Call</title>
    <meta name="description" content="Connect directly to your live VanisSetu AI voice agent. Talk in Gujarati, Hindi &amp; English.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #1c2128;
            --border: #30363d;
            --green-brand: #0A5C3E;
            --green-light: #1a9f6a;
            --green-bright: #3fb950;
            --gold: #D49A2A;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
            background: rgba(13,17,23,0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), #e8b84a);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(26,159,106,0.12);
            border: 1px solid rgba(26,159,106,0.25);
            font-size: 13px;
            font-weight: 500;
            color: var(--green-light);
        }

        .header-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green-bright);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .header-back {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .header-back:hover { color: var(--text-primary); }

        /* ── Call Screen Area ── */
        .call-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 24px;
            background: radial-gradient(circle at center, rgba(10,92,62,0.12) 0%, rgba(13,17,23,0) 70%);
        }

        .call-card {
            text-align: center;
            max-width: 520px;
            width: 100%;
            padding: 48px 32px;
            border-radius: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green-brand), var(--green-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 24px;
            border: 2px solid var(--border);
            box-shadow: 0 0 30px rgba(26,159,106,0.25);
        }

        .call-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .call-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .loader-dots {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .loader-dots span {
            width: 10px;
            height: 10px;
            background: var(--green-bright);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .instructions {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            background: rgba(255,255,255,0.02);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        /* ── Edesy Widget Repositioning & Styling ── */
        /* Center the Edesy widget container on this page */
        #voice-widget-root {
            position: fixed !important;
            left: 50% !important;
            top: 55% !important;
            transform: translate(-50%, -50%) !important;
            bottom: auto !important;
            right: auto !important;
            z-index: 100000 !important;
        }

        /* Hide widget button backdrop/shadow to blend with the card */
        #voice-widget-root::shadow .vw-button {
            box-shadow: 0 10px 30px rgba(10,92,62,0.3) !important;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="/" class="logo">
            <div class="logo-dot"></div>
            <span>VanisSetu AI</span>
        </a>
        <div class="header-badge">Edesy Live Agent</div>
        <a href="/" class="header-back">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Back to Home
        </a>
    </header>

    <!-- Main Content -->
    <div class="call-container">
        <div class="call-card">
            <div class="avatar">🎙️</div>
            <h1 class="call-title">લાઇવ કૉલ કનેક્ટ થઈ રહ્યો છે</h1>
            <p class="call-subtitle">Connecting you to the live VanisSetu AI agent powered by Edesy...</p>
            
            <div class="loader-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="instructions">
                💡 કૃપા કરીને ઉપર પોપ-અપ અથવા સેન્ટરમાં આપેલા કૉલ બટન પર ક્લિક કરો અને માઇક્રોફોનની પરમિશન આપો.
            </div>
        </div>
    </div>

    <!-- Edesy Voice Agent Widget Script -->
    <script
      src="https://voice-agent.edesy.in/widget/voice-widget.js"
      data-api-key="wk_live_5d91df39c3b562e81e030c250b6a4c40"
      async
    ></script>

    <!-- Auto-Trigger Call Widget -->
    <script>
        // Check for widget element and trigger call automatically
        const checkWidgetInterval = setInterval(() => {
            const widgetRoot = document.getElementById('voice-widget-root');
            if (widgetRoot && widgetRoot.shadowRoot) {
                const callBtn = widgetRoot.shadowRoot.querySelector('.vw-button');
                if (callBtn) {
                    // Trigger click to open the Edesy dialer
                    callBtn.click();
                    clearInterval(checkWidgetInterval);
                }
            }
        }, 300);

        // Fail-safe clear after 10 seconds
        setTimeout(() => {
            clearInterval(checkWidgetInterval);
        }, 10000);
    </script>
</body>
</html>
