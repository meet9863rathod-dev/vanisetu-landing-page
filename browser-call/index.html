<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanisSetu AI — Live Browser Call</title>
    <meta name="description" content="Connect directly to your live VanisSetu AI voice agent. Talk in Gujarati, Hindi &amp; English.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+Gujarati:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #F6F3EC;
            --bg-card: #ffffff;
            --border: rgba(20, 36, 28, 0.09);
            --green-brand: #0A5C3E;
            --green-light: #0E7A53;
            --green-bright: #0E7A53;
            --gold: #D49A2A;
            --text-primary: #14241C;
            --text-secondary: #46584F;
            --text-muted: #6b7c73;
        }

        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .guj {
            font-family: 'Noto Sans Gujarati', 'Manrope', sans-serif;
        }

        /* Background Canvas/Visual elements to match landing page */
        .bg-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 80% 20%, rgba(212,154,42,0.15), transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(14,122,83,0.1), transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px clamp(18px, 5vw, 56px);
            border-bottom: 1px solid rgba(20, 36, 28, 0.06);
            background: rgba(246, 243, 236, 0.8);
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 11px;
            font-family: 'Sora', sans-serif;
            font-size: 21px;
            font-weight: 800;
            color: var(--green-brand);
            text-decoration: none;
            letter-spacing: -.02em;
        }

        .logo-dot-wrapper {
            width: 34px;
            height: 34px;
            border-radius: 11px;
            background: linear-gradient(135deg, var(--green-light), var(--green-brand));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 16px rgba(14,122,83,0.25);
        }

        .logo-dot {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 0 3px rgba(212,154,42,0.28);
        }

        .header-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(14,122,83,0.08);
            border: 1px solid rgba(14,122,83,0.16);
            font-size: 13.5px;
            font-weight: 600;
            color: var(--green-brand);
        }

        .header-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green-light);
            animation: pulse-dot 1.6s infinite;
        }

        .header-back {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14.5px;
            font-weight: 700;
            transition: color 0.2s;
        }

        .header-back:hover { color: var(--green-brand); }

        /* ── Call Screen Area ── */
        .call-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 24px;
            z-index: 10;
        }

        .call-card {
            text-align: center;
            max-width: 520px;
            width: 100%;
            padding: 56px 40px;
            border-radius: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: 0 14px 40px rgba(20, 36, 28, 0.05);
            z-index: 10;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green-light), var(--green-brand));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 28px;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 10px 24px rgba(14,122,83,0.18);
        }

        .call-title {
            font-weight: 800;
            font-size: clamp(24px, 4vw, 30px);
            line-height: 1.2;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .call-subtitle {
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .loader-dots {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .loader-dots span {
            width: 10px;
            height: 10px;
            background: var(--green-light);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .instructions {
            font-size: 13.5px;
            color: var(--text-muted);
            line-height: 1.6;
            background: rgba(14,122,83,0.03);
            padding: 18px;
            border-radius: 14px;
            border: 1px solid rgba(14,122,83,0.08);
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: .25; }
        }

        /* ── Edesy Widget Styling override ── */
        #voice-widget-root {
            position: fixed !important;
            left: 50% !important;
            top: 55% !important;
            transform: translate(-50%, -50%) !important;
            bottom: auto !important;
            right: auto !important;
            z-index: 100000 !important;
        }

        /* Ensure smooth animation and scale for centered widget */
        #voice-widget-root::shadow .vw-button {
            background: linear-gradient(135deg, var(--green-light), var(--green-brand)) !important;
            box-shadow: 0 12px 36px rgba(14,122,83,0.3) !important;
        }
    </style>
</head>
<body>
    <!-- Background visual assets -->
    <div class="bg-glow"></div>

    <!-- Header -->
    <header class="header">
        <a href="/" class="logo">
            <div class="logo-dot-wrapper">
                <div class="logo-dot"></div>
            </div>
            <span>VanisSetu AI</span>
        </a>
        <div class="header-badge guj">લાઇવ ડેમો કનેક્શન</div>
        <a href="/" class="header-back guj">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            પાછા જાઓ
        </a>
    </header>

    <!-- Main Content -->
    <div class="call-container">
        <div class="call-card">
            <div class="avatar">🎙️</div>
            <h1 class="call-title guj">લાઇવ કૉલ કનેક્ટ થઈ રહ્યો છે</h1>
            <p class="call-subtitle">Connecting you to the live VanisSetu AI agent powered by Edesy...</p>
            
            <div class="loader-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="instructions guj">
                💡 કૃપા કરીને ઉપર પોપ-અપ અથવા સેન્ટરમાં આપેલા કૉલ બટન પર ક્લિક કરો અને માઇક્રોફોનની પરમિશન આપો.
            </div>
        </div>
    </div>

    <!-- Edesy Voice Agent Widget Script -->
    <script
      src="https://voice-agent.edesy.in/widget/voice-widget.js"
      data-api-key="wk_live_5d91df39c3b562e81e030c250b6a4c40"
      async
    ></script>

    <!-- Auto-Trigger Call Widget -->
    <script>
        // Check for widget element and trigger call automatically
        const checkWidgetInterval = setInterval(() => {
            const widgetRoot = document.getElementById('voice-widget-root');
            if (widgetRoot && widgetRoot.shadowRoot) {
                const callBtn = widgetRoot.shadowRoot.querySelector('.vw-button');
                if (callBtn) {
                    // Trigger click to open the Edesy dialer
                    callBtn.click();
                    clearInterval(checkWidgetInterval);
                }
            }
        }, 300);

        // Fail-safe clear after 10 seconds
        setTimeout(() => {
            clearInterval(checkWidgetInterval);
        }, 10000);
    </script>
</body>
</html>
